name: notes
description: "GoodNotes-inspired note-taking app for Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & core
  cupertino_icons: ^1.0.8

  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2

  # Drawing
  pencil_field: ^0.4.10

  # Media / sharing
  image_picker: ^1.1.2
  share_plus: 12.0.1

  # Colour picker dialog
  flutter_colorpicker: ^1.1.0

  # Export / import
  pdf: ^3.11.1
  printing: ^5.13.1
  file_picker: ^8.1.2
  path: ^1.9.0
  flutter_archive: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # No custom fonts or assets needed — everything is Material Icons + system fonts.
